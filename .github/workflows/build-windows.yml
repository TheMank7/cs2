name: Build Windows Desktop Executable

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows executable
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $scripts = $pkg.scripts.PSObject.Properties.Name

          if ($scripts -contains "dist:win") {
            npm run dist:win
          }
          elseif ($scripts -contains "dist") {
            npm run dist
          }
          elseif ($scripts -contains "make") {
            npm run make
          }
          else {
            npx --yes electron-builder --win portable --x64
          }

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: CS2-Inventory-Tracker-Windows-Executable
          path: |
            dist/**/*.exe
            release/**/*.exe
            out/**/*.exe
            *.exe
